name: ocean-litter
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24.0
  - pyyaml>=6.0
  - pillow>=10.0.0
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8 # GPU 사용 시 필요, CPU만 사용 시 제거 가능
  - pip:
      - ultralytics>=8.0.0
      - opencv-python-headless>=4.8.0
      - fpdf2>=2.7.0
